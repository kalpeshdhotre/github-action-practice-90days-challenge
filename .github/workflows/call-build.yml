name: call Resusable Build

on:
  push:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  print-version:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Print build version from resuable workflow
        run: echo "Build version was ${{ needs.build.outputs.built_version }}"

name: Day 44 Pipeline

on: workflow_dispatch

jobs:
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm secret is set (safely)
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi

      - name: Try to print the secret directly
        run: echo "Raw value -> ${{ secrets.MY_SECRET_MESSAGE }}"

      - name: Use secret as an environment variable
        env:
          SECRET_MSG: ${{ secrets.MY_SECRET_MESSAGE }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [ -n "$SECRET_MSG" ]; then
            echo "Env var loaded (length: ${#SECRET_MSG} chars)"
          fi
          echo "Docker username present: $([ -n "$DOCKER_USER" ] && echo yes || echo no)"

  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate a report file
        run: |
          mkdir -p reports
          {
            echo "Day 44 Test Report"
            echo "Generated at: $(date -u)"
            echo "Status: PASS"
          } > reports/test-report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: day44-test-report
          path: reports/test-report.txt
          retention-days: 7

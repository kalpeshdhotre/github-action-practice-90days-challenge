name: Hosted Runners Demo

# Disabled on push temp for Day-42
# on: push
on: workflow_dispatch

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: System info
        run: |
          echo "OS: $(uname -a)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
      - name: Check pre-installed tools
        run: |
          docker --version
          python3 --version
          node --version
          git --version

  windows-job:
    runs-on: windows-latest
    steps:
      - name: System info
        run: |
          echo "OS: Windows"
          echo "Hostname: $env:COMPUTERNAME"
          echo "User: $env:USERNAME"

  macos-job:
    runs-on: macos-latest
    steps:
      - name: System info
        run: |
          echo "OS: $(sw_vers)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

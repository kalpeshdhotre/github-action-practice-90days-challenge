name: Docker Build and push

on:
  push:
    branches:
      - main
      - "**"

env:
  IMAGE_NAME: kalpeshdhotre/todo-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: set short SHA
        id: vars
        run: echo "sha_short=$(git rev-aprse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dcoker image
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}

      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_TOKEN }}

      # - name: Push to Docker Hub
      #   uses: docker/build-push-action@v7
      #   with:
      #     context: ./app
      #     push: true
      #     tags: |
      #       ${{ env.IMAGE_NAME }}:latest
      #       ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}

      # Task 4 - Only Push to main branch
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: ./2026/day-45/app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}

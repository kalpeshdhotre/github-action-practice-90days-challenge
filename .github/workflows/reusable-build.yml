name: Resuable Build Workflow

on:
  workflow_call:
    inputs:
      app_name:
        description: "Name of the application being built"
        required: true
        type: string
      environment:
        description: "Target deployement enviroement"
        required: true
        type: string
        default: "staging"
    secrets:
      docker_token:
        description: "Docker hub token used for authenticated pushes"
        required: true
    outputs:
      built_version:
        description: "Generated version string for this build"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Print build info
        run: |
          echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"
          echo `Docker Token is set: true`

      - name: Generate version string
        id: set_version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v1.0-${SHORT_SHA}"\
          echo "Generated version: ${VERSION}"
          echo "version=${VERSION}" >> "GITHUB_OUTPUT"

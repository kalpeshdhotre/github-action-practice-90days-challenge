name: Job Outputs Demo

on: push

jobs:
  generate-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{steps.get-date.outputs.date}}
    steps:
      - name: Get date
        id: get-date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

  user-date:
    runs-on: ubuntu-latest
    needs: generate-date
    steps:
      - name: Print received data
        run: 'echo "Date from previous job : ${{ needs.generate-date.outputs.today }}"'

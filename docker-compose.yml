name: todo-app

networks:
    app-net:
        driver: bridge

volumes:
    mongo-data:

services:
    mongo:
        image: mongo:7-jammy
        restart: unless-stopped
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
        volumes:
            - mongo-data:/data/db
        networks:
            - app-net
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    api:
        build:
            context: ./app
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            MONGO_URI: ${MONGO_URI}
            PORT: ${PORT}
        networks:
            - app-net
        depends_on:
            mongo:
                condition: service_healthy
